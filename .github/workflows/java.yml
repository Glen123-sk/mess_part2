name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download JUnit Console Standalone
      run: wget https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.9.3/junit-platform-console-standalone-1.9.3.jar

    - name: Compile Java files
      run: javac src/Messenger2.java src/Messenger2Test.java

    - name: Run JUnit tests
      run: java -jar junit-platform-console-standalone-1.9.3.jar --class-path . --scan-class-path
